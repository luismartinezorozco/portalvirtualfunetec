                            <button class="btn btn-secondary w-full sm:w-auto" onclick="window.Router.navigate('student-dashboard')">Volver</button>
                        </div>
                        <p class="text-gray mb-4" style="font-size: 1rem; line-height: 1.6;">${course.description}</p>
                        <div class="progress-container mb-2" style="height: 12px;">
                            <div class="progress-bar bg-success" style="width: ${percentage}%;"></div>
                        </div>
                        <p class="text-right text-sm text-gray font-bold mb-4">Tu progreso: ${percentage}%</p>
                    </div>

                    <div class="course-view-layout">
                        <div class="flex-col gap-4 w-full">
                            <div class="video-container" id="player-area">
                                ${currentContent ? window.StudentViews.generatePlayerHtml(currentContent) : '<div class="w-full text-center p-6 bg-bg"><p class="text-gray font-bold">Seleccione un contenido del temario para comenzar</p></div>'}
                            </div>

                            <div id="btn-container-area">
                                ${currentContent && !progress.completedContentIds.includes(String(currentContent.id)) ? `
                                    <div class="action-grid cols-1 m-0 p-0 border-none">
                                        <button class="btn-card success" onclick="window.StudentViews.markCompleted('${courseId}', '${currentContent.id}')">
                                            <span>Marcar módulo como completado</span>
                                        </button>
                                    </div>
                                ` : ""}
                            </div>

                            ${canTakeExam ? `
                                <div class="card text-center mt-4 border ${progress.estadoExamen === "reprobado" ? "border-danger" : "border-success"} w-full" style="background: ${progress.estadoExamen === "reprobado" ? "#fef2f2" : "var(--white)"}; box-sizing:border-box; word-break:break-word;">
                                    <h4 class="${progress.estadoExamen === "reprobado" ? "text-danger" : "text-primary"} mb-2 font-bold" style="font-size:1.2rem;">Evaluación Final</h4>
                                    ${examHtml}
                                </div>
                            ` : ""}
                        </div>

                        <div class="content-list" style="align-self: start; max-height: 500px; overflow-y: auto;">
                            <div class="p-4 bg-bg font-bold border-b text-text">Temario del curso</div>
                            ${contents.map((c, idx) => {
                                const isCompleted = progress.completedContentIds.includes(String(c.id));
                                return `
                                    <div class="content-item ${currentContent && String(currentContent.id) === String(c.id) ? "active" : ""} ${isCompleted ? "completed" : ""}"
                                         onclick="window.StudentViews.changeContent('${courseId}', '${c.id}', event)">
                                        <span class="title">${idx + 1}. ${c.title}</span>
                                    </div>
                                `;
                            }).join("")}
                        </div>
                    </div>
                `;
                
                container.innerHTML = mainHtml;
            },
            requestExamRepeat: function(courseId) {
                const studentId = String(window.State.currentUser.id);
                const progress = window.DB.get("progress").find((p) => String(p.studentId) === studentId && String(p.courseId) === String(courseId));
                
                if (progress) {
                    window.DB.update("progress", progress.id, { estadoExamen: "solicitado" });
                    window.UI.showAlert("Se ha enviado la solicitud de repetición de examen al administrador.");
                    window.Router.navigate("student-course", { id: courseId });
                }
            },
            generatePlayerHtml: function(content) {
                if (content.type === "video") {
                    const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                    const match = content.url.match(ytRegex);
                    const videoId = match ? match[1] : null;
                    
                    if (videoId) {
                        return `
                            <div class="video-wrapper" onclick="this.innerHTML='<iframe src=\\'https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0\\' allow=\\'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture\\' allowfullscreen></iframe>'; this.style.cursor='default';">
                                <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" class="video-thumbnail" alt="Video Thumbnail" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
                                <div class="video-overlay-main"></div>
                            </div>
                        `;
                    }
                    return `<div class="video-wrapper"><iframe src="${content.url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
                }
                
                return `
                    <div class="text-center p-6 w-full flex-col items-center justify-center bg-white text-text" style="min-height: 300px;">
                        <h3 class="mb-4">Enlace Externo / Documento</h3>
                        <a href="${content.url}" target="_blank" class="btn btn-primary btn-lg w-full sm:w-auto">Abrir en nueva pestaña</a>
                    </div>
                `;
            },
            changeContent: function(courseId, contentId, event) {
                const content = window.DB.get("contents")
                    .filter((c) => String(c.courseId) === String(courseId))
                    .find((c) => String(c.id) === String(contentId));
                    
                const playerArea = document.getElementById("player-area");
                if (playerArea && content) {
                    playerArea.innerHTML = window.StudentViews.generatePlayerHtml(content);
                }
                
                document.querySelectorAll(".content-item").forEach((el) => el.classList.remove("active"));
                if (event && event.currentTarget) {
                    event.currentTarget.classList.add("active");
                }
                
                const studentId = String(window.State.currentUser.id);
                const progress = window.DB.get("progress").find((p) => String(p.studentId) === studentId && String(p.courseId) === String(courseId));
                
                const btnArea = document.getElementById("btn-container-area");
                if (btnArea) {
                    if (progress?.completedContentIds.includes(String(contentId))) {
                        btnArea.innerHTML = "";
                    } else {
                        btnArea.innerHTML = `
                            <div class="action-grid cols-1 m-0 p-0 border-none">
                                <button class="btn-card success" onclick="window.StudentViews.markCompleted('${courseId}', '${contentId}')">
                                    <span>Marcar módulo como completado</span>
                                </button>
                            </div>
                        `;
                    }
                }
            },
            markCompleted: function(courseId, contentId) {
                const studentId = String(window.State.currentUser.id);
                const progress = window.DB.get("progress").find((p) => String(p.studentId) === studentId && String(p.courseId) === String(courseId));
                
                if (progress && !progress.completedContentIds.includes(String(contentId))) {
                    const newIds = [...progress.completedContentIds, String(contentId)];
                    window.DB.update("progress", progress.id, { 
                        completedContentIds: newIds, 
                        estadoExamen: "pendiente" 
                    });
                }
                window.Router.navigate("student-course", { id: courseId });
            },
            renderExam: function(container, courseId) {
                const exam = window.DB.get("exams").find((e) => String(e.courseId) === String(courseId));
                const course = window.DB.get("courses").find((c) => String(c.id) === String(courseId));
                
                let shuffledQuestions = (exam?.questions || []).map((q, qIndex) => {
                    let options = q.options.map((text, oIndex) => ({ text, isCorrect: oIndex === q.correctIdx }));
                    window.shuffleArray(options);
                    let newCorrectIdx = options.findIndex((o) => o.isCorrect);
                    
                    return {
                        originalQIndex: qIndex,
                        q: q.q,
                        options: options.map((o) => o.text),
                        correctIdx: newCorrectIdx
                    };
                });
                
                window.shuffleArray(shuffledQuestions);
                window.tempStudentExam = { passScore: exam.passScore, questions: shuffledQuestions };
                
                let html = `
                    <div class="card mx-auto max-w-lg w-full overflow-x-hidden" style="box-sizing:border-box;">
                        <div class="flex justify-between items-center mb-4 mobile-stack">
                            <h3 class="m-0">Evaluación: ${course.name}</h3>
                            <button class="btn btn-secondary w-full sm:w-auto" onclick="window.Router.navigate('student-course', {id: '${courseId}'})">Volver</button>
                        </div>
                        <p class="text-gray mb-4 border-b pb-4">Puntaje mínimo para aprobar: <strong>${exam.passScore}%</strong></p>

                        <form id="exam-form" onsubmit="event.preventDefault(); window.StudentViews.submitExam('${courseId}')">
                            ${window.tempStudentExam.questions.map((q, idx) => `
                                <div class="mb-6 p-4 bg-bg rounded">
                                    <h4 class="mb-3 text-text">${idx + 1}. ${q.q}</h4>
                                    ${q.options.map((opt, oIdx) => `
                                        <div class="mb-2 flex items-center gap-2 cursor-pointer text-gray">
                                            <input type="radio" name="q_${idx}" value="${oIdx}" required style="transform: scale(1.2);">
                                            <span style="word-break:break-word;">${opt}</span>
                                        </div>
                                    `).join("")}
                                </div>
                            `).join("")}
                            <button type="submit" class="btn btn-primary btn-lg w-full mt-4" id="submit-exam-btn">Enviar Respuestas</button>
                        </form>
                    </div>
                `;
                
                container.innerHTML = html;
            },
            submitExam: function(courseId) {
                const submitBtn = document.getElementById("submit-exam-btn");
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = "Enviando...";
                }
                
                const formEl = document.getElementById("exam-form");
                let correctCount = 0;
                let details = [];
                
                window.tempStudentExam.questions.forEach((q, idx) => {
                    const selectedInput = formEl.elements[`q_${idx}`];
                    const val = selectedInput ? selectedInput.value : null;
                    const isCorrect = val !== null && parseInt(val) === q.correctIdx;
                    
                    if (isCorrect) correctCount++;
                    
                    details.push({
                        pregunta: q.q,
                        respuestaUsuario: val !== null ? q.options[parseInt(val)] : "Sin responder",
                        respuestaCorrecta: q.options[q.correctIdx],
                        esCorrecta: isCorrect
                    });
                });
                
                const percentage = Math.round((correctCount / window.tempStudentExam.questions.length) * 100);
                const passed = percentage >= window.tempStudentExam.passScore;
                const studentId = String(window.State.currentUser.id);
                
                const progress = window.DB.get("progress").find((p) => String(p.studentId) === studentId && String(p.courseId) === String(courseId));
                const attempts = progress?.intentos ? progress.intentos + 1 : 1;
                
                if (progress) {
                    window.DB.update("progress", progress.id, { 
                        intentos: attempts, 
                        estadoExamen: passed ? "aprobado" : "reprobado" 
                    });
                }
                
                window.DB.add("exam_results", {
                    studentId: studentId,
                    courseId: String(courseId),
                    score: percentage,
                    date: new Date().toISOString(),
                    details: details
                });
                
                let modalHtml = `
                    <div class="text-center">
                        <h2 class="mb-2 ${passed ? "text-success" : "text-danger"}">Calificación: ${percentage}%</h2>
                        <p class="mb-4 text-gray">Respondiste correctamente ${correctCount} de ${window.tempStudentExam.questions.length} preguntas.</p>
                `;
                
                if (passed) {
                    modalHtml += `
                        <div class="p-4 mb-4 rounded" style="background: #d1fae5;">
                            <h4 class="text-success">¡Aprobado!</h4>
                            <p>Tu solicitud de certificado ha sido enviada al administrador para su revisión.</p>
                        </div>
                        <div class="action-grid cols-1">
                            <button class="btn-card primary" onclick="window.UI.closeModal(); window.Router.navigate('student-certs')">
                                <span>Ir a Mis Certificados</span>
                            </button>
                        </div>
                    `;
                    
                    window.DB.add("certificates", {
                        studentId: studentId,
                        courseId: String(courseId),
                        status: "pending",
                        score: percentage
                    });
                    
                    const adminUser = window.DB.get("users").find((u) => u.role === "admin");
                    if (adminUser) {
                        window.notifyUser(adminUser.id, `${window.State.currentUser.name} ha aprobado un examen. Certificado pendiente de revisión.`);
                    }
                } else {
                    modalHtml += `
                        <div class="p-4 mb-4 rounded" style="background: #fee2e2;">
                            <h4 class="text-danger">No Aprobado</h4>
                            <p>Necesitas al menos ${window.tempStudentExam.passScore}% para aprobar.</p>
                        </div>
                        <div class="action-grid cols-1">
                            <button class="btn-card secondary" onclick="window.UI.closeModal(); window.Router.navigate('student-course', {id: '${courseId}'})">
                                <span>Volver al curso</span>
                            </button>
                        </div>
                    `;
                }
                
                modalHtml += `</div>`;
                window.UI.showModal(modalHtml);
            },
            renderCerts: function(container) {
                const studentId = String(window.State.currentUser.id);
                const certs = window.DB.get("certificates").filter((c) => String(c.studentId) === studentId);
                const courses = window.DB.get("courses");
                
                let html = `
                    <div class="flex justify-between items-center flex-wrap gap-4 mb-4 mobile-stack">
                        <h3 class="m-0">Mis Certificados</h3>
                    </div>
                    <div class="course-grid">
                `;
                
                if (certs.length === 0) {
                    html += '<p class="text-gray">No tienes certificados aún. Completa un curso y aprueba el examen.</p>';
                }
                
                certs.forEach((cert) => {
                    const course = courses.find((c) => String(c.id) === String(cert.courseId));
                    if (course) {
                        const topColor = cert.status === "approved" ? "var(--success)" : cert.status === "rejected" ? "var(--danger)" : "var(--warning)";
                        
                        html += `
                            <div class="card text-center flex-col justify-between" style="border-top: 4px solid ${topColor};">
                                <div>
                                    <h4 class="mb-2 text-text">${course.name}</h4>
                                    <p class="text-sm text-gray mb-2">Puntaje obtenido: ${cert.score}%</p>
                                </div>
                        `;
                        
                        if (cert.status === "pending") {
                            html += `
                                <div>
                                    <span class="badge badge-warning mb-4 inline-block">En Revisión</span>
                                    <p class="text-xs text-gray">Esperando aprobación del administrador.</p>
                                </div>
                            `;
                        } else if (cert.status === "rejected") {
                            html += `
                                <div>
                                    <span class="badge badge-danger mb-4 inline-block">Rechazado</span>
                                    <p class="text-xs text-gray">Comunícate con soporte.</p>
                                </div>
                            `;
                        } else {
                            html += `
                                <div>
                                    <span class="badge badge-success mb-4 inline-block">Aprobado</span>
                                    <div class="action-grid cols-1 m-0 p-0 border-none">
                                        <button class="btn-card primary" onclick="window.StudentViews.viewDiploma('${course.name.replace(/'/g, "\\\\'")}', '${window.State.currentUser.name.replace(/'/g, "\\\\'")}', '${cert.id}')">
                                            <span>Ver Diploma</span>
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                        
                        html += `</div>`;
                    }
                });
                
                html += `</div>`;
                container.innerHTML = html;
            },
            viewDiploma: function(courseName, studentName, certId) {
                window.UI.showAlert("Generando certificado en PDF, por favor espera...");
                window.StudentViews.generateCertificatePDF({ courseName, studentName, certId });
            },
            generateCertificatePDF: function(data) {
                const { courseName, studentName, certId } = data;
                const cert = window.DB.get("certificates").find(c => String(c.id) === String(certId)) || {};
                const user = window.DB.get("users").find(u => String(u.id) === String(cert.studentId)) || {};
                const courseObj = window.DB.get("courses").find(c => String(c.id) === String(cert.courseId)) || {};
                const docId = user.document || "No registrado";
                const cHours = courseObj.hours || 48;
                
                const d = cert.overrideDate ? new Date(cert.overrideDate + "T00:00:00") : new Date();
                const dStr = `Dado en Barranquilla, a los ${d.getDate()} de ${["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][d.getMonth()]} de ${d.getFullYear()}`;
                
                const fName = (cert.overrideName || studentName).toUpperCase();
                const fCourse = (cert.overrideCourse || courseName).toUpperCase();

                const loadJsPdf = () => window.jspdf ? Promise.resolve() : new Promise((res, rej) => {
                    const s = document.createElement("script");
                    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
                    s.onload = res; s.onerror = rej; document.head.appendChild(s);
                });

                const getB64 = (url, isProxy=false) => new Promise(res => {
                    if(!url) return res(null);
                    const img = new Image(); img.crossOrigin = "Anonymous";
                    img.onload = () => {
                        const cvs = document.createElement("canvas"); cvs.width = img.width; cvs.height = img.height;
                        cvs.getContext("2d").drawImage(img, 0, 0); res(cvs.toDataURL("image/png"));
                    };
                    img.onerror = () => {
                        if (!isProxy && url.startsWith('http') && !url.includes('cloudinary')) {
                            res(getB64('https://corsproxy.io/?' + encodeURIComponent(url), true));
                        } else {
                            res(null);
                        }
                    };
                    img.src = url;
                });

                const cfg = window.DB.get("cert_config")[0] || {};
                const defs = {
                    h1: "Institución de Educación", h2: "para el Trabajo y Desarrollo Humano",
                    sh1: "Aprobado por la Secretaria de Educación Distrital de Barranquilla mediante Resolución N° 06077 del 19 de octubre de 2023.",
                    sh2: "Educación para el Trabajo y Desarrollo Humano.", constar: "Hace constar que :",
                    aprobo: "Aprobó el curso de:", duracion: "Con una duración de ( {horas} horas).",
                    vigencia: "( vigencia 2 años )", f1n: "KELLY PATRICIA REYES UTRIA", f1r: "Directora",
                    f2n: "NEDIS FERNANDEZ BARRANCO", f2r: "Coordinadora Académica",
                    ft1: "funetec2022@gmail.com", ft2: "calle 47#18_24 Barranquilla", ft3: "3046781679"
                };
                const val = (key) => cfg[key] !== undefined ? cfg[key] : defs[key];

                const icMail = "https://cdn-icons-png.flaticon.com/512/8747/8747888.png";
                const icMap = "https://img.freepik.com/vector-premium/vector-ubicacion-icono-mapa-rojo-simple_393879-4461.jpg";
                const icPhone = "https://us.123rf.com/450wm/photoart23d/photoart23d1902/photoart23d190201348/117662113-phone-symbol-icon-red-simple-isolated-vector-illustration.jpg";

                Promise.all([
                    loadJsPdf(), 
                    getB64(val('f1img')), 
                    getB64(val('f2img')),
                    getB64(icMail),
                    getB64(icMap),
                    getB64(icPhone)
                ]).then(([_, s1b64, s2b64, m1, m2, m3]) => {
                    const pdf = new window.jspdf.jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
                    const cX = 148.5; 
                    
                    const T = (txt, y, sz, fnt="helvetica", st="normal", clr=0, x=cX, al="center") => {
                        pdf.setTextColor(clr); pdf.setFont(fnt, st); pdf.setFontSize(sz);
                        pdf.text(txt, x, y, { align: al });
                    };

                    // Logo
                    pdf.setFillColor(153, 27, 27); pdf.rect(cX-10, 15, 5, 18, 'F');
                    pdf.setFillColor(225, 29, 42); pdf.rect(cX-3, 10, 5, 23, 'F');
                    pdf.setFillColor(252, 165, 165); pdf.rect(cX+4, 15, 5, 18, 'F');
                    T("FUNETEC", 38, 12, "helvetica", "bold");

                    // Textos principales
                    T(val('h1'), 55, 26, "times", "bold");
                    T(val('h2'), 65, 26, "times", "bold");
                    T(val('sh1'), 75, 10, "helvetica", "normal", 50);
                    T(val('sh2'), 80, 10, "helvetica", "normal", 50);
                    T(val('constar'), 95, 14);
                    T(fName, 115, 32, "times", "bold");
                    T(`Identificado con cédula de ciudadanía N.º ${docId}`, 125, 11);
                    T(val('aprobo'), 140, 14);
                    T(fCourse, 155, 28, "times", "bold");
                    
                    let durText = val('duracion') || "";
                    if (durText.includes('{horas}')) durText = durText.replace('{horas}', cHours);
                    else durText = durText.replace('48', cHours);

                    T(durText, 170, 11, "helvetica", "normal", 50);
                    T(dStr, 176, 11, "helvetica", "normal", 50);
                    T(val('vigencia'), 182, 11, "helvetica", "normal", 50);

                    // Firmas (Con imágenes)
                    pdf.setDrawColor(0); pdf.setLineWidth(0.5);
                    
                    // Firma 1
                    pdf.line(40, 180, 110, 180);
                    if(s1b64) pdf.addImage(s1b64, "PNG", 50, 155, 50, 24);
                    T(val('f1n'), 185, 9, "helvetica", "bold", 0, 75);
                    T(val('f1r'), 190, 9, "helvetica", "normal", 0, 75);

                    // Firma 2
                    pdf.line(187, 180, 257, 180);
                    if(s2b64) pdf.addImage(s2b64, "PNG", 197, 155, 50, 24);
                    T(val('f2n'), 185, 9, "helvetica", "bold", 0, 222);
                    T(val('f2r'), 190, 9, "helvetica", "normal", 0, 222);

                    // Footer con Iconos Reales
                    pdf.setTextColor(50, 50, 50);
                    pdf.setFont("helvetica", "bold");
                    pdf.setFontSize(10); 
                    
                    let t1 = val('ft1'), t2 = val('ft2'), t3 = val('ft3');
                    let w2 = pdf.getTextWidth(t2), w3 = pdf.getTextWidth(t3);
                    let fy = 199.5, cy = 198.5;

                    if(m1) pdf.addImage(m1, "PNG", 38, cy - 2.5, 5, 5);
                    pdf.text(t1, 45, fy, { align: "left" });

                    if(m2) pdf.addImage(m2, "PNG", cX - (w2/2) - 7, cy - 2.5, 5, 5);
                    pdf.text(t2, cX, fy, { align: "center" });

                    if(m3) pdf.addImage(m3, "PNG", 257 - w3 - 7, cy - 2.5, 5, 5);
                    pdf.text(t3, 257, fy, { align: "right" });

                    pdf.save(`Certificado_${fName.replace(/\s+/g, "_")}.pdf`);
                    window.UI.closeModal();

                }).catch(() => window.UI.showAlert("Error al generar PDF. Revise su conexión."));
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            try {
                const loadingEl = document.getElementById("loading-db");
                const formEl = document.getElementById("login-form");
                
                if (formEl) {
                    formEl.addEventListener("submit", (e) => {
                        e.preventDefault();
                        const docVal = document.getElementById("login-document")?.value || "";
                        const passVal = document.getElementById("login-password")?.value || "";
                        window.Auth.login(docVal, passVal);
                    });
                }
                
                if (window.SafeStorage.getItem("currentUser")) {
                    if (loadingEl) {
                        loadingEl.classList.remove("hidden");
                        loadingEl.textContent = "Verificando sesión...";
                    }
                    if (formEl) formEl.classList.add("hidden");
                    
                    window.DB.init((err) => {
                        if (loadingEl) loadingEl.classList.add("hidden");
                        
                        if (err) {
                            console.warn("Fallo al verificar con Firebase. Forzando cierre local.");
                            window.Auth.logout();
                        } else {
                            window.Auth.checkSession();
                        }
                    });
                } else {
                    if (loadingEl) loadingEl.classList.add("hidden");
                    window.App.showLogin();
                    window.DB.init();
                }
            } catch (error) {
                console.error("Error en la inicialización de DOMContentLoaded:", error);
            }
        });
    </script>
</body>
</html>
