    <style>

        .table-responsive { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; border-radius: 8px; }

        td, th { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }

        #sidebar-overlay.show { display: block; opacity: 1; }

        .notification-btn, .profile-btn { position: relative; background: 0 0; border: none; border-radius: 8px; cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; color: var(--text); min-height: 44px; }
        .notification-btn .icon, .profile-btn .icon { width: 1.5rem; height: 1.5rem; }
        .notification-btn:hover, .profile-btn:hover { background-color: var(--bg); }
        .notification-btn:hover .icon, .profile-btn:hover .icon { transform: scale(1.1); }

        .mobile-menu-btn .icon { width: 1.5rem; height: 1.5rem; }

        .notification-badge { position: absolute; top: 4px; right: 4px; background: var(--primary); color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 2px solid var(--white); }
        
        /* Optimización Ventana Notificaciones */
        .notification-dropdown { position: absolute; top: calc(100% + 8px); right: 0; width: 340px; background: var(--white); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15); max-height: 400px; overflow-y: auto; display: none; z-index: 100; -webkit-overflow-scrolling: touch; }

        .notif-item:hover { background-color: var(--bg); }
        .notif-item.unread { background-color: rgba(225, 29, 42, 0.04); border-left: 4px solid var(--primary); }

        .course-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--white); transition: transform 0.3s ease; display: flex; flex-direction: column; height: 100%; }

        .course-view-layout { display: grid; grid-template-columns: 3fr 1fr; gap: 2rem; align-items: start; }
        .content-list { border: 1px solid var(--border); border-radius: 12px; background: var(--white); overflow: hidden; }

        @media (min-width: 640px) {

            .notification-dropdown { position: fixed; top: 72px; right: 1rem; left: 1rem; width: auto; max-height: calc(100vh - 90px); }
        }

        @media (max-width: 480px) {

            .mobile-stack > * { width: 100% !important; max-width: 100% !important; margin: 0 !important; }

    </style>
